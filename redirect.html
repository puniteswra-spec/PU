<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Remote Monitor</title>
<script>
// Automatically fetch the latest active server from GitHub urls.ini
async function checkAndRedirect() {
    const status = document.getElementById('status');
    status.textContent = 'Locating Active Server from GitHub...';
    
    try {
        const response = await fetch('https://raw.githubusercontent.com/puniteswra-spec/PU/main/urls.ini?t=' + Date.now());
        const text = await response.text();
        const urls = text.split('\n').filter(line => line.trim() !== '' && !line.startsWith('#'));
        
        if (urls.length > 0) {
            let activeUrl = urls[0].trim();
            // Convert ws/wss to http/https for browser access
            activeUrl = activeUrl.replace('wss://', 'https://').replace('ws://', 'http://');
            status.textContent = 'Found Server! Redirecting to ' + activeUrl + '...';
            window.location.href = activeUrl;
        } else {
            status.textContent = '⚠️ No active servers found in urls.ini';
        }
    } catch (e) {
        status.textContent = '⚠️ Failed to fetch registry: ' + e.message;
    }
}
</script>
<style>
body{background:#0f0f23;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;text-align:center;padding:20px}
h1{color:#7c7cf0;margin-bottom:10px}
p{color:#888;margin:5px 0}
button{background:#7c7cf0;color:#fff;border:none;padding:12px 30px;border-radius:6px;font-size:16px;cursor:pointer;margin-top:15px}
</style>
</head>
<body>
<h1>🖥 Remote Monitor</h1>
<p id="status">Click to connect</p>
<button onclick="checkAndRedirect()">Open Dashboard</button>
</body>
</html>
